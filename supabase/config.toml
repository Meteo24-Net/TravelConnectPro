# Travel Connect Pro — Supabase project config
# Project: pjyjblllcllnqsjbvbfc
# Dashboard: https://supabase.com/dashboard/project/pjyjblllcllnqsjbvbfc

[project]
project_id = "pjyjblllcllnqsjbvbfc"

# ─── API ────────────────────────────────────────────────────────────────────
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ─── DATABASE ───────────────────────────────────────────────────────────────
[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# ─── REALTIME ───────────────────────────────────────────────────────────────
[realtime]
enabled = true

# ─── STUDIO ─────────────────────────────────────────────────────────────────
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# ─── INBUCKET (local email testing) ─────────────────────────────────────────
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# ─── STORAGE ─────────────────────────────────────────────────────────────────
[storage]
enabled = true
file_size_limit = "50MiB"

# ─── AUTH ───────────────────────────────────────────────────────────────────
[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false     # TCP uses device_hash — no anon auth users
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false          # toggle ON in production

# Telegram login is our primary manager notification channel;
# we DON'T use OAuth for manager auth — they use magic link / email.
[auth.sms]
enable_signup = false

# ─── EDGE FUNCTIONS ─────────────────────────────────────────────────────────
[functions]
verify_jwt = true

# ─── ANALYTICS ──────────────────────────────────────────────────────────────
[analytics]
enabled = false
port = 54327
backend = "postgres"
