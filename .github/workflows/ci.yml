name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Migration sanity check ─────────────────────────────────────────────────
  db-check:
    name: DB migrations + pgTAP tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations + run pgTAP tests
        run: supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ─── TypeScript type generation ─────────────────────────────────────────────
  types:
    name: Generate + check types
    runs-on: ubuntu-latest
    needs: db-check
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate types from remote schema
        run: npm run types:gen

      - name: TypeScript check
        run: npm run check

      - name: Fail if generated types changed uncommitted
        run: |
          if ! git diff --quiet packages/types/src/database.ts; then
            echo "::error::Generated types are out of date. Run 'npm run types:gen' and commit the result."
            git diff packages/types/src/database.ts
            exit 1
          fi

  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ─── Deploy migrations to staging (main only) ────────────────────────────────
  deploy-staging:
    name: Push migrations → staging
    runs-on: ubuntu-latest
    needs: [db-check, types, lint]
    if: github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to project
        run: supabase link --project-ref pjyjblllcllnqsjbvbfc

      - name: Push migrations
        run: supabase db push
