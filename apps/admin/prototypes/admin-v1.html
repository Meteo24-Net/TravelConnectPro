<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Connect Pro — Admin v.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --tcp-blue: #009FE3;
    --tcp-blue-dark: #0077AD;
    --tcp-gold: #c5a059;
    --tcp-green: #2ecc71;
    --tcp-red: #ef4444;
    --tcp-amber: #f59e0b;
    --bg-base: #0a0a0d;
    --bg-panel: #14141a;
    --bg-panel-2: #1c1c24;
    --bg-input: #0f0f14;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.18);
    --text-primary: #f5f5f7;
    --text-secondary: #a1a1aa;
    --text-tertiary: #71717a;
  }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
  .bg-base { background: var(--bg-base); }
  .bg-panel { background: var(--bg-panel); }
  .bg-panel-2 { background: var(--bg-panel-2); }
  .bg-input { background: var(--bg-input); }
  .border-subtle { border-color: var(--border-subtle); }
  .border-default { border-color: var(--border-default); }
  .border-strong { border-color: var(--border-strong); }
  .text-primary { color: var(--text-primary); }
  .text-secondary { color: var(--text-secondary); }
  .text-tertiary { color: var(--text-tertiary); }
  .text-tcp-blue { color: var(--tcp-blue); }
  .text-tcp-gold { color: var(--tcp-gold); }
  .text-tcp-green { color: var(--tcp-green); }
  .bg-tcp-blue { background: var(--tcp-blue); }
  .bg-tcp-gold { background: var(--tcp-gold); }
  .border-tcp-blue { border-color: var(--tcp-blue); }
  .ring-tcp-blue:focus { box-shadow: 0 0 0 2px rgba(0, 159, 227, 0.4); outline: none; }

  /* Form controls */
  .input, .select, .textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text-primary);
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none;
    border-color: var(--tcp-blue);
    box-shadow: 0 0 0 3px rgba(0, 159, 227, 0.15);
  }
  .input.mono, .textarea.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .input::placeholder { color: var(--text-tertiary); }
  label.lbl {
    display: block;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }
  .lbl-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; line-height: 1.4; font-weight: 400; text-transform: none; letter-spacing: normal; }

  /* Section card */
  .section-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    overflow: hidden;
  }
  .section-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-panel-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title { font-size: 14px; font-weight: 600; }
  .section-body { padding: 20px; }

  /* Sidebar nav */
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
  .nav-item.active {
    background: rgba(0, 159, 227, 0.1);
    color: var(--tcp-blue);
    border-color: rgba(0, 159, 227, 0.2);
  }
  .nav-item .ico { font-size: 15px; }

  /* Buttons */
  .btn {
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--tcp-blue);
    color: white;
  }
  .btn-primary:hover { background: var(--tcp-blue-dark); }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    border-color: var(--border-default);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); }
  .btn-danger {
    background: rgba(239, 68, 68, 0.1);
    color: var(--tcp-red);
    border-color: rgba(239, 68, 68, 0.25);
  }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.15); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }

  /* Tag pill */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 1px solid;
  }
  .tag-active { background: rgba(46, 204, 113, 0.1); color: var(--tcp-green); border-color: rgba(46, 204, 113, 0.25); }
  .tag-trial { background: rgba(245, 158, 11, 0.1); color: var(--tcp-amber); border-color: rgba(245, 158, 11, 0.25); }
  .tag-blue { background: rgba(0, 159, 227, 0.1); color: var(--tcp-blue); border-color: rgba(0, 159, 227, 0.25); }
  .tag-gray { background: rgba(255,255,255,0.05); color: var(--text-secondary); border-color: var(--border-default); }
  .tag-auto { background: rgba(46, 204, 113, 0.08); color: var(--tcp-green); border-color: rgba(46, 204, 113, 0.2); }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--text-tertiary);
    border-radius: 50%;
    transition: all .2s;
  }
  .toggle.on { background: rgba(0, 159, 227, 0.2); border-color: var(--tcp-blue); }
  .toggle.on::after { left: 18px; background: var(--tcp-blue); }

  /* Color swatch */
  .swatch {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border-default);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Stat card */
  .stat-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-num { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .stat-trend { font-size: 11px; margin-top: 6px; font-weight: 500; }

  /* Carousel sequence */
  .carousel-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    transition: all .15s;
  }
  .carousel-item:hover { border-color: var(--border-strong); }
  .carousel-num {
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .item-game { border-left: 3px solid var(--tcp-amber); }
  .item-map  { border-left: 3px solid var(--tcp-green); }
  .item-airport { border-left: 3px solid var(--tcp-blue); }

  /* Airport card */
  .airport-card {
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    padding: 14px 16px;
    transition: all .15s;
  }
  .airport-card:hover { border-color: var(--border-strong); }

  /* Code block (JSON preview) */
  .json-pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--tcp-green);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg-panel-2);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--tcp-green);
    border-radius: 10px;
    padding: 14px 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    z-index: 1000;
    max-width: 380px;
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Progress badge */
  .badge-built { background: rgba(46, 204, 113, 0.1); color: var(--tcp-green); border: 1px solid rgba(46, 204, 113, 0.25); }
  .badge-partial { background: rgba(245, 158, 11, 0.1); color: var(--tcp-amber); border: 1px solid rgba(245, 158, 11, 0.25); }
  .badge-needed { background: rgba(239, 68, 68, 0.1); color: var(--tcp-red); border: 1px solid rgba(239, 68, 68, 0.25); }

  /* Drag indicator */
  .drag-handle {
    color: var(--text-tertiary);
    cursor: grab;
    user-select: none;
    font-size: 12px;
    padding: 0 4px;
  }
  .drag-handle:hover { color: var(--text-secondary); }

  /* Status dot */
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }
  .dot-on { background: var(--tcp-green); box-shadow: 0 0 6px rgba(46, 204, 113, 0.5); }
  .dot-warn { background: var(--tcp-amber); }
  .dot-off { background: var(--tcp-red); }

  /* Phase strip */
  .phase-strip {
    background: linear-gradient(90deg, rgba(0, 159, 227, 0.06) 0%, transparent 50%);
    border: 1px solid rgba(0, 159, 227, 0.15);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
</style>
</head>
<body class="bg-base text-primary">

<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// ============================================================
// MOCK DATA
// ============================================================
const PROPERTIES = [
  { id: 'rad-bat-001', name: 'Radisson Blu Batumi', status: 'active', lobby: 3, rooms: 80, online: 76 },
  { id: 'rad-tbs-002', name: 'Radisson Blu Tbilisi', status: 'active', lobby: 2, rooms: 95, online: 88 },

const INITIAL_CONFIG = {
  client: {
    client_id: 'RAD-BAT-001',
    name: 'Radisson Blu Batumi',
    internal_ref: 'TCP-2026-001',
    status: 'active',
    website: 'radisson.com/batumi',
    phones: ['+995 32 2 402 200', '+995 599 11 22 33'],
    address: '1 Ninoshvili Street, Batumi, Georgia',
    coordinates: { lat: 41.6546, lng: 41.6384 },
    timezone: 'Asia/Tbilisi',
    country: 'GE',
  },
  admin: {
    display_name: 'Radisson Batumi — Front Desk',
    email: 'admin@radissonbatumi.ge',
    role: 'property_admin',
    last_login: '2026-04-26T09:14:00Z',
  },
  languages: ['en', 'ru', 'ka', 'tr'],
  welcome: {
    timing_sec: 6,
    highlight_offer: 'Join us at the Sky Bar for sunset wine tasting at 19:00.',
  },
  airports: [
    { id: 'a1', iata: 'BUS', name: 'Batumi International', priority: 'primary', drive_min: 18, fare: '25–40 GEL', enabled: true },
    { id: 'a2', iata: 'TBS', name: 'Tbilisi International', priority: 'secondary', drive_min: 320, fare: '280–350 GEL', enabled: true },
  ],
  branding: {
    logo_url: 'https://images.seeklogo.com/logo-png/48/2/radisson-blu-logo-png_seeklogo-480374.png',
    logo_dark_url: '',
    logo_height: 90,
    logo_filter: 'invert',
    colors: {
      brand_primary: '#003366',
      brand_accent: '#c5a059',
      bg_base: '#0a0a0d',
      widget_header: '#009FE3',
      solar_accent: '#ffcc00',
    }
  },
  carousel: {
    sequence: [
      { type: 'game', id: 'roulette', label: 'Roulette Wheel', duration: 90 },
      { type: 'map', id: 'map', label: 'Area Map', duration: 60 },
      { type: 'game', id: 'dice', label: 'Smart Roller', duration: 90 },
      { type: 'airport', id: 'BUS', label: 'Airport — BUS', duration: 120 },
      { type: 'game', id: 'memory', label: 'Memory Matrix', duration: 90 },
      { type: 'map', id: 'map', label: 'Area Map', duration: 60 },
      { type: 'game', id: 'shell', label: 'Shell Game', duration: 90 },
      { type: 'airport', id: 'TBS', label: 'Airport — TBS', duration: 120 },
      { type: 'game', id: 'text-wheel', label: 'Rewards Wheel', duration: 90 },
      { type: 'map', id: 'map', label: 'Area Map', duration: 60 },
    ]
  },
  ticker: {
    announcements: [
      '📢 CHECK-OUT: Standard check-out time is 12:00 PM.',
      '🚐 AIRPORT SHUTTLE: Departs every hour from the main lobby.',
    ],
    events: [
      '🍷 BATUMI WINE FESTIVAL: Today on the Boulevard from 16:00.',
      '🎭 ALPHABET TOWER: Live Jazz Performance tonight at 21:00.',
    ],
    offers: [
      '🛎️ SPA: 20% off all deep-tissue massages before 14:00.',
      '🍽️ DINING: Fresh Black Sea seafood at the restaurant tonight.',
    ],
    sports: { football: true, basketball: true, tennis: false, f1: false },
    category_duration_sec: 30,
  },
  qr_cards: [
    { id: 'wifi', label: 'GUEST WI-FI', url: 'WIFI:S:Radisson_Guest;T:WPA;P:guest123;;', enabled: true },
    { id: 'checkout', label: 'LATE CHECKOUT', url: 'https://radisson.com/batumi/services/checkout', enabled: true },
    { id: 'menu', label: 'RESTAURANT MENU', url: 'https://radisson.com/batumi/dining/menu', enabled: true },
    { id: 'spa', label: 'SPA & GYM', url: 'https://radisson.com/batumi/wellness/spa', enabled: true },
    { id: 'rewards', label: 'RADISSON REWARDS', url: 'https://radissonhotels.com/rewards', enabled: true },
  ],
};

// ============================================================
// HELPERS
// ============================================================
const TYPE_COLORS = {
  game: { dot: 'var(--tcp-amber)', cls: 'item-game', label: 'Game' },
  map:  { dot: 'var(--tcp-green)', cls: 'item-map',  label: 'Map' },
  airport: { dot: 'var(--tcp-blue)', cls: 'item-airport', label: 'Airport' },
};

function formatTotalTime(sequence) {
  const total = sequence.reduce((s, i) => s + (i.duration || 0), 0);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}m ${s}s`;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [tab, setTab] = useState('dashboard');
  const [config, setConfig] = useState(INITIAL_CONFIG);
  const [showJson, setShowJson] = useState(false);
  const [propertyId, setPropertyId] = useState('rad-bat-001');
  const [toast, setToast] = useState(null);

  const setSection = (key, value) => setConfig({ ...config, [key]: value });
  const setNested = (section, field, value) => setConfig({ ...config, [section]: { ...config[section], [field]: value } });

  const saveConfig = () => {
    setToast({ type: 'success', text: 'Configuration pushed to fleet. All screens will update within 2 seconds.' });
    setTimeout(() => setToast(null), 4000);
  };

  return (
    <div className="min-h-screen flex flex-col">
      <TopBar
        propertyId={propertyId}
        onPropertyChange={setPropertyId}
        onSave={saveConfig}
        showJson={showJson}
        onToggleJson={() => setShowJson(!showJson)}
      />
      <div className="flex-1 flex" style={{ minHeight: 'calc(100vh - 60px)' }}>
        <Sidebar tab={tab} onTab={setTab} />
        <main className="flex-1 overflow-auto p-6">
          <div className={`flex gap-6 ${showJson ? 'flex-row' : ''}`}>
            <div className="flex-1 space-y-5 min-w-0">
              {tab === 'dashboard' && <DashboardTab config={config} />}
              {tab === 'client' && <ClientTab config={config} setSection={setSection} setNested={setNested} />}
              {tab === 'airports' && <AirportsTab config={config} setSection={setSection} />}
              {tab === 'branding' && <BrandingTab config={config} setNested={setNested} />}
              {tab === 'carousel' && <CarouselTab config={config} setSection={setSection} />}
              {tab === 'ticker' && <TickerTab config={config} setNested={setNested} setSection={setSection} />}
              {tab === 'qr' && <QrTab config={config} setSection={setSection} />}
              {tab === 'welcome' && <WelcomeTab config={config} setNested={setNested} />}
            </div>
            {showJson && <JsonPreviewPanel config={config} />}
          </div>
        </main>
      </div>
      {toast && <Toast {...toast} />}
    </div>
  );
}

// ============================================================
// TOP BAR
// ============================================================
function TopBar({ propertyId, onPropertyChange, onSave, showJson, onToggleJson }) {
  const property = PROPERTIES.find(p => p.id === propertyId);
  return (
    <header className="border-b border-subtle bg-panel" style={{ height: 60 }}>
      <div className="h-full px-6 flex items-center justify-between gap-4">
        <div className="flex items-center gap-8">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center font-bold" style={{ background: 'linear-gradient(135deg, #009FE3, #c5a059)', color: 'white', fontSize: 16 }}>T</div>
            <div>
              <div className="text-sm font-semibold leading-none">Travel Connect Pro</div>
              <div className="text-tertiary leading-none mt-1" style={{ fontSize: 10, letterSpacing: 1.5 }}>SUPERADMIN · v.1</div>
            </div>
          </div>

          <div className="flex items-center gap-2 bg-input rounded-lg px-3 py-1.5 border border-default" style={{ minWidth: 280 }}>
            <span className="text-tertiary" style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1 }}>PROPERTY</span>
            <select
              className="bg-transparent text-sm font-medium flex-1 outline-none cursor-pointer"
              value={propertyId}
              onChange={e => onPropertyChange(e.target.value)}
              style={{ color: 'var(--text-primary)' }}
            >
              {PROPERTIES.map(p => (
                <option key={p.id} value={p.id} style={{ background: 'var(--bg-panel)' }}>{p.name}</option>
              ))}
            </select>
            <span className={`tag ${property.status === 'active' ? 'tag-active' : 'tag-trial'}`}>{property.status}</span>
          </div>
        </div>

        <div className="flex items-center gap-2">
          <div className="flex items-center gap-2 px-3 text-secondary" style={{ fontSize: 11 }}>
            <span className="dot dot-on"></span>
            <span>Realtime: connected</span>
          </div>
          <button className="btn btn-ghost" onClick={onToggleJson}>
            {showJson ? '◧ Hide JSON' : '◧ Show JSON'}
          </button>
          <button className="btn btn-primary" onClick={onSave}>
            <span>↑</span>
            <span>Push to fleet</span>
          </button>
        </div>
      </div>
    </header>
  );
}

// ============================================================
// SIDEBAR
// ============================================================
function Sidebar({ tab, onTab }) {
  const items = [
    { id: 'dashboard', label: 'Dashboard', ico: '◉' },
    { id: 'client', label: 'Client identity', ico: '◇' },
    { id: 'airports', label: 'Airports', ico: '✈' },
    { id: 'branding', label: 'Branding', ico: '◐' },
    { id: 'carousel', label: 'Carousel', ico: '↻' },
    { id: 'ticker', label: 'Ticker', ico: '≡' },
    { id: 'qr', label: 'QR cards', ico: '▦' },
    { id: 'welcome', label: 'Welcome screen', ico: '☼' },
  ];
  return (
    <aside className="border-r border-subtle bg-panel p-3" style={{ width: 220, flexShrink: 0 }}>
      <div className="text-tertiary px-3 pt-1 pb-3" style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1.5 }}>CONFIGURATION</div>
      <nav className="space-y-1">
        {items.map(item => (
          <div key={item.id} className={`nav-item ${tab === item.id ? 'active' : ''}`} onClick={() => onTab(item.id)}>
            <span className="ico">{item.ico}</span>
            <span>{item.label}</span>
          </div>
        ))}
      </nav>

      <div className="text-tertiary px-3 pt-6 pb-3" style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1.5 }}>COMING IN V.2</div>
      <nav className="space-y-1 opacity-50 pointer-events-none">
        <div className="nav-item"><span className="ico">⚏</span>Game rules engine</div>
        <div className="nav-item"><span className="ico">▤</span>QR analytics</div>

// ============================================================
// CAROUSEL TAB
// ============================================================
function CarouselTab({ config, setSection }) {
  const moveItem = (idx, direction) => {
    const seq = [...config.carousel.sequence];
    const target = idx + direction;
    if (target < 0 || target >= seq.length) return;
    [seq[idx], seq[target]] = [seq[target], seq[idx]];
    setSection('carousel', { ...config.carousel, sequence: seq });
  };
  const removeItem = (idx) => {
    const seq = config.carousel.sequence.filter((_, i) => i !== idx);
    setSection('carousel', { ...config.carousel, sequence: seq });
  };
  const updateDuration = (idx, value) => {
    const seq = [...config.carousel.sequence];
    seq[idx] = { ...seq[idx], duration: parseInt(value) || 0 };
    setSection('carousel', { ...config.carousel, sequence: seq });
  };
  const addItem = (type, id, label) => {
    const seq = [...config.carousel.sequence, { type, id, label, duration: 90 }];
    setSection('carousel', { ...config.carousel, sequence: seq });
  };

  const games = [
    { id: 'roulette', label: 'Roulette Wheel' },
    { id: 'dice', label: 'Smart Roller' },
    { id: 'memory', label: 'Memory Matrix' },
    { id: 'shell', label: 'Shell Game' },
    { id: 'text-wheel', label: 'Rewards Wheel' },
    { id: 'spin-win', label: 'Spin to Win' },
  ];

  return (
    <>
      <PageTitle title="Carousel" subtitle="The main rotating panel. Only games, the area map, and airport flight slides. Weather and QR cards live permanently in the sidebar — not here." />

      <div className="phase-strip">
        <span style={{ fontSize: 18 }}>↻</span>
        <div className="text-sm text-secondary">
          Total loop time: <strong className="text-primary">{formatTotalTime(config.carousel.sequence)}</strong> · {config.carousel.sequence.length} slides · loops back to start automatically
        </div>
      </div>

      <div className="section-card">
        <div className="section-head">
          <div className="section-title">Sequence</div>
          <div className="flex gap-2">
            <button className="btn btn-secondary text-xs">↺ Set all to 60s</button>
            <button className="btn btn-secondary text-xs">↺ Set all to 90s</button>
          </div>
        </div>
        <div className="section-body space-y-2">
          {config.carousel.sequence.map((item, idx) => {
            const c = TYPE_COLORS[item.type];
            return (
              <div key={idx} className={`carousel-item ${c.cls}`}>
                <span className="drag-handle">⋮⋮</span>
                <div className="carousel-num">{idx + 1}</div>
                <span className="tag tag-gray" style={{ minWidth: 64, justifyContent: 'center' }}>{c.label}</span>
                <div className="flex-1 text-sm font-medium">{item.label}</div>
                <div className="flex items-center gap-1.5">
                  <input
                    type="number"
                    className="input mono text-center"
                    style={{ width: 72, padding: '6px 8px' }}
                    value={item.duration}
                    onChange={e => updateDuration(idx, e.target.value)}
                  />
                  <span className="text-tertiary text-xs">sec</span>
                </div>
                <div className="flex gap-1">
                  <button className="btn btn-ghost px-2" onClick={() => moveItem(idx, -1)} disabled={idx === 0}>↑</button>
                  <button className="btn btn-ghost px-2" onClick={() => moveItem(idx, 1)} disabled={idx === config.carousel.sequence.length - 1}>↓</button>
                  <button className="btn btn-ghost px-2" onClick={() => removeItem(idx)} style={{ color: 'var(--tcp-red)' }}>×</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <AddItemPanel
          title="Add a game"
          color="var(--tcp-amber)"
          items={games}
          onAdd={(item) => addItem('game', item.id, item.label)}
        />
        <AddItemPanel
          title="Add map slide"
          color="var(--tcp-green)"
          items={[{ id: 'map', label: 'Area Map' }]}
          onAdd={(item) => addItem('map', 'map', 'Area Map')}
        />
        <AddItemPanel
          title="Add airport slide"
          color="var(--tcp-blue)"
          items={config.airports.map(a => ({ id: a.iata, label: `${a.iata} — ${a.name}` }))}
          onAdd={(item) => addItem('airport', item.id, `Airport — ${item.id}`)}
        />
      </div>
    </>
  );
}

function AddItemPanel({ title, color, items, onAdd }) {

      <div className="section-head">

      <div className="section-body space-y-1.5">
        {items.length === 0

          : items.map(item => (
            <button

  return (
    <>
      <PageTitle title="Ticker" subtitle="The scrolling bar at the bottom. Cycles through announcements, events, offers, and live sports — admin controls the text, sports come from API." />

      <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
        <TickerList title="Announcements" color="var(--tcp-red)" items={config.ticker.announcements} onUpdate={(i, v) => updateLine('announcements', i, v)} onAdd={() => addLine('announcements')} onRemove={(i) => removeLine('announcements', i)} />
        <TickerList title="Local events" color="var(--tcp-green)" items={config.ticker.events} onUpdate={(i, v) => updateLine('events', i, v)} onAdd={() => addLine('events')} onRemove={(i) => removeLine('events', i)} />
        <TickerList title="Hotel offers" color="var(--tcp-gold)" items={config.ticker.offers} onUpdate={(i, v) => updateLine('offers', i, v)} onAdd={() => addLine('offers')} onRemove={(i) => removeLine('offers', i)} />
      </div>

      <div className="section-card">
        <div className="section-head">
          <div className="section-title">Live sports — algorithmic feed</div>
          <span className="tag tag-blue">via API-Sports</span>
        </div>
        <div className="section-body">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            {Object.entries(config.ticker.sports).map(([sport, on]) => (
              <button
                key={sport}
                className={`flex items-center justify-between px-3 py-2.5 rounded-lg border transition-colors ${on ? 'border-strong' : 'border-default opacity-60'}`}
                style={{ background: on ? 'rgba(0,159,227,0.06)' : 'var(--bg-input)' }}
                onClick={() => toggleSport(sport)}
              >
                <span className="text-sm font-medium capitalize">{sport.replace('_', ' ')}</span>
                <div className={`toggle ${on ? 'on' : ''}`}></div>
              </button>
            ))}
          </div>
          <div className="phase-strip">
            <span style={{ fontSize: 18 }}>⚽</span>
            <div className="text-sm text-secondary">
              <strong className="text-primary">Goal popups</strong> appear automatically when scores change — no extra config. Turn on a sport here and live events for that sport will trigger overlay alerts on all screens.
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function TickerList({ title, color, items, onUpdate, onAdd, onRemove }) {
  return (
    <div className="section-card" style={{ borderTopColor: color, borderTopWidth: 3 }}>
      <div className="section-head">
        <div className="section-title text-sm">{title}</div>
        <span className="text-tertiary text-xs">{items.length}</span>
      </div>
      <div className="section-body space-y-2">
        {items.map((item, idx) => (
          <div key={idx} className="flex gap-1.5">
            <textarea
              className="textarea"
              rows="2"
              style={{ resize: 'none' }}
              value={item}
              onChange={e => onUpdate(idx, e.target.value)}
            />
            <button className="btn btn-ghost px-2" onClick={() => onRemove(idx)} style={{ color: 'var(--tcp-red)' }}>×</button>
          </div>
        ))}
        <button className="btn btn-secondary w-full justify-center text-xs" onClick={onAdd}>+ Add line</button>
      </div>
    </div>
  );
}

// ============================================================
// QR CARDS TAB
// ============================================================
function QrTab({ config, setSection }) {
  const update = (id, field, value) => {
    const next = config.qr_cards.map(q => q.id === id ? { ...q, [field]: value } : q);
    setSection('qr_cards', next);
  };

  return (
    <>
      <PageTitle title="QR cards" subtitle="The carousel of QR codes shown in the right sidebar. Each QR points to a tracked redirect URL — guest scans are logged automatically." />

      <div className="phase-strip">
        <span style={{ fontSize: 18 }}>▦</span>
        <div className="text-sm text-secondary">
          <strong className="text-primary">v.2 will add:</strong> per-QR analytics, conversion tracking, A/B testing, time-window rules, daily caps. For now: enable, label, and set destination URL.
        </div>
      </div>

      <div className="space-y-3">
        {config.qr_cards.map(qr => (
          <div key={qr.id} className="airport-card">
            <div className="flex items-start gap-4">
              <div className="bg-white rounded-md p-2 flex-shrink-0" style={{ width: 80, height: 80 }}>
                <img src={`https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(qr.url)}&size=120x120`} alt="QR" style={{ width: '100%', height: '100%' }} />
              </div>
              <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-3">
                <Field label="Card label" hint="Shown above the QR on screen">
                  <input className="input" value={qr.label} onChange={e => update(qr.id, 'label', e.target.value)} />
                </Field>
                <Field label="Destination URL">
                  <input className="input mono" value={qr.url} onChange={e => update(qr.id, 'url', e.target.value)} />
                </Field>
                <div className="md:col-span-2 flex items-center justify-between">
                  <div className="font-mono text-tertiary" style={{ fontSize: 11 }}>id: {qr.id}</div>
                  <div className="flex items-center gap-2">
                    <span className="text-tertiary" style={{ fontSize: 11 }}>enabled</span>
                    <div className={`toggle ${qr.enabled ? 'on' : ''}`} onClick={() => update(qr.id, 'enabled', !qr.enabled)}></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

// ============================================================
// WELCOME SCREEN TAB
// ============================================================
function WelcomeTab({ config, setNested }) {
  return (
    <>
      <PageTitle title="Welcome screen" subtitle="The branded splash that appears when a TV powers on. Lobby screens see it on system reboot. Room TVs see it every time the guest turns on the TV." />

      <div className="section-card">
        <div className="section-head">
          <div className="section-title">Welcome content</div>
        </div>
        <div className="section-body grid grid-cols-1 md:grid-cols-2 gap-4">
          <Field label="Display duration (sec)" hint="How long the splash stays before fading to carousel">
            <input className="input mono" type="number" value={config.welcome.timing_sec} onChange={e => setNested('welcome', 'timing_sec', parseInt(e.target.value))} />
          </Field>
          <div></div>
          <Field label="Today's highlight offer" hint="Shown at the bottom of the welcome splash. Update daily for freshness.">
            <textarea className="textarea" rows="3" value={config.welcome.highlight_offer} onChange={e => setNested('welcome', 'highlight_offer', e.target.value)} />
          </Field>
          <div>
            <label className="lbl">Preview</label>
            <div className="rounded-lg border border-default p-6 flex flex-col justify-center" style={{ background: 'linear-gradient(135deg, #14141a, #0a0a0d)', minHeight: 150 }}>
              <div className="text-tertiary" style={{ fontSize: 10, fontWeight: 600, letterSpacing: 2 }}>TODAY'S HIGHLIGHT</div>
              <div className="text-sm mt-2 leading-relaxed" style={{ color: 'var(--tcp-gold)' }}>{config.welcome.highlight_offer}</div>
            </div>
          </div>
        </div>
      </div>

      <div className="section-card">
        <div className="section-head">
          <div className="section-title">Per-language greeting overrides</div>
          <span className="tag tag-gray">v.2 will add Claude AI auto-translation</span>
        </div>
        <div className="section-body grid grid-cols-1 md:grid-cols-2 gap-4">
          {config.languages.map(lang => (
            <Field key={lang} label={`${lang.toUpperCase()} greeting (optional)`} hint="Leave blank for auto: Good morning / afternoon / evening">
              <input className="input" placeholder={`Welcome — ${lang}`} />
            </Field>
          ))}
        </div>
      </div>
    </>
  );
}

// ============================================================
// JSON PREVIEW PANEL
// ============================================================
function JsonPreviewPanel({ config }) {
  return (
    <div className="section-card flex-shrink-0" style={{ width: 380, position: 'sticky', top: 0, alignSelf: 'flex-start', maxHeight: 'calc(100vh - 100px)' }}>
      <div className="section-head">
        <div className="section-title">Live config payload</div>
        <span className="tag tag-active">syncing</span>
      </div>
      <div className="section-body" style={{ maxHeight: 'calc(100vh - 200px)', overflowY: 'auto', padding: 14 }}>
        <pre className="json-pre">{JSON.stringify(config, null, 2)}</pre>
      </div>
    </div>
  );
}

// ============================================================
// SHARED COMPONENTS
// ============================================================
function PageTitle({ title, subtitle }) {
  return (
    <div className="pb-2">
      <h1 className="text-2xl font-semibold tracking-tight">{title}</h1>
      <p className="text-secondary mt-1 text-sm leading-relaxed max-w-3xl">{subtitle}</p>
    </div>
  );
}

function Field({ label, hint, children }) {
  return (
    <div>
      <label className="lbl">{label}</label>
      {children}
      {hint && <div className="lbl-hint">{hint}</div>}
    </div>
  );
}

function Toast({ type, text }) {
  return (
    <div className="toast">
      <div className="flex items-start gap-3">
        <span style={{ fontSize: 20 }}>✓</span>
        <div>
          <div className="text-sm font-semibold" style={{ color: 'var(--tcp-green)' }}>Saved successfully</div>
          <div className="text-secondary text-xs mt-1">{text}</div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
